repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-added-large-files
        args: ['--maxkb=500']
      - id: no-commit-to-branch
        args: ['--branch', 'main']
      - id: check-merge-conflict

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.11
    hooks:
      - id: ruff
        args: ['--fix', '--exit-non-zero-on-fix']
      - id: ruff-format

  - repo: local
    hooks:
      - id: type-check
        name: type check
        entry: uv run --locked --group dev ty check
        language: system
        types: [python]
      - id: check-typing-boundaries
        name: check typing boundaries
        entry: uv run --locked --group dev python scripts/check_typing_boundaries.py src/
        language: system
        types: [python]
        pass_filenames: false
      - id: check-version-sync
        name: check version sync
        entry: uv run --locked --group dev python scripts/check_version_sync.py
        language: system
        always_run: true
        pass_filenames: false

  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        args: ['--baseline', '.secrets.baseline']
