name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  code-quality:
    name: Code quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - run: uv python install 3.14
      - run: uv sync --locked --group dev
      - run: uv run --no-sync ruff check src/ tests/
      - run: uv run --no-sync ruff format --check src/ tests/
      - run: uv run --no-sync ty check src/
      - run: uv run --no-sync python scripts/check_typing_boundaries.py src/
      - run: uv run --no-sync python scripts/check_version_sync.py

  # --- semgrep start ---
  security-scan:
    name: Security scan
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep:1.61.0
    steps:
      - uses: actions/checkout@v4
      - run: semgrep scan --error --config=p/python --config=p/security-audit --config=p/secrets
  # --- semgrep end ---

  tests:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - run: uv python install 3.14
      - run: uv sync --locked --group dev
      - run: uv run --no-sync pytest

  release:
    name: Release
    needs: [code-quality, tests, security-scan]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - run: uv python install 3.14
      - run: uv sync --locked --group dev

      - name: Determine target tag
        id: target
        run: |
          version="$(uv run --no-sync python -c 'import game_lattice; print(game_lattice.__version__)')"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "tag=v${version}" >> "$GITHUB_OUTPUT"

      - name: Tag-health gate
        id: gate
        run: |
          tag='${{ steps.target.outputs.tag }}'
          version='${{ steps.target.outputs.version }}'
          git fetch --tags --force
          if git rev-parse -q --verify "refs/tags/${tag}" >/dev/null; then
            tagged="$(git show "${tag}:src/game_lattice/__init__.py" | sed -n 's/^__version__ = "\(.*\)"/\1/p')"
            if [ "${tagged}" = "${version}" ]; then
              echo "Tag ${tag} already exists at version ${version}; no-op."
              echo "proceed=false" >> "$GITHUB_OUTPUT"
            else
              echo "::error::Tag ${tag} exists but points at version '${tagged}', not ${version}."
              exit 1
            fi
          else
            echo "proceed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Re-assert version sync
        if: steps.gate.outputs.proceed == 'true'
        run: uv run --no-sync python scripts/check_version_sync.py

      - name: Smoke-test the commit
        if: steps.gate.outputs.proceed == 'true'
        run: |
          ref="git+https://github.com/Guardantix/game-lattice@${{ github.sha }}"
          fixture="tests/fixtures/release-smoke/.game-lattice.yml"
          uvx --python 3.14 --from "${ref}" game-lattice check --config "${fixture}"
          uvx --python 3.14 --from "${ref}" game-lattice lint --config "${fixture}"
          workdir="$(mktemp -d)"
          ( cd "${workdir}" && uvx --python 3.14 --from "${ref}" game-lattice init )

      - name: Create and push the tag
        if: steps.gate.outputs.proceed == 'true'
        run: |
          tag='${{ steps.target.outputs.tag }}'
          git tag "${tag}" "${{ github.sha }}"
          git push origin "${tag}"

      - name: Confirm pinned ref resolves
        if: steps.gate.outputs.proceed == 'true'
        run: |
          tag='${{ steps.target.outputs.tag }}'
          uvx --python 3.14 --from "git+https://github.com/Guardantix/game-lattice@${tag}" game-lattice --version
